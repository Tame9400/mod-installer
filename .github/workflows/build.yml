name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build-args: --win
            ext: .exe
          - os: macos-latest
            build-args: --mac
            ext: .dmg
          - os: ubuntu-latest
            build-args: --linux
            ext: .AppImage
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:${{ matrix.os == 'windows-latest' && 'win' || matrix.os == 'macos-latest' && 'mac' || 'linux' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mod-Installer-${{ matrix.os }}
          path: dist-pkg/*${{ matrix.ext }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Mod-Installer-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist-pkg/*
          generate_release_notes: true
