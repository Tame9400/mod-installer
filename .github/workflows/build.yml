name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-args: --win
            ext: .exe
          - os: macos-latest
            build-args: --mac
            ext: .zip
          - os: ubuntu-latest
            build-args: --linux
            ext: .AppImage
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 libatspi2.0-0 libdrm2 libgbm1 libfuse2

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile
        run: npx tsc

      - name: Vite build
        run: npx vite build --config vite.config.js

      - name: Package
        run: npx electron-builder ${{ matrix.build-args }}

      - name: List output files
        run: ls -la dist-pkg/ || dir dist-pkg\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mod-Installer-${{ matrix.os }}
          path: dist-pkg/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Mod-Installer-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist-pkg/*
          generate_release_notes: true
