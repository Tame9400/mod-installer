name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-args: --win
          - os: macos-latest
            build-args: --mac
          - os: ubuntu-latest
            build-args: --linux
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 libatspi2.0-0 libdrm2 libgbm1 libfuse2

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile
        run: npx --no-install tsc 2>&1

      - name: Vite build
        run: npx --no-install vite build --config vite.config.js 2>&1

      - name: Package
        run: npx --no-install electron-builder ${{ matrix.build-args }} 2>&1

      - name: Find artifacts
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== dist-pkg ==="
          ls -la dist-pkg/ 2>/dev/null || echo "(no dist-pkg dir)"
          echo "=== recursive find ==="
          find . -name "*.exe" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.dmg" 2>/dev/null || echo "find not available"
          echo "=== dist dir ==="
          ls -la dist/ 2>/dev/null || echo "(no dist dir)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mod-Installer-${{ matrix.os }}
          path: |
            dist-pkg/
